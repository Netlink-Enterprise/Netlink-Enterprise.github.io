<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlink | Enterprise Command</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0a14; 
            --purple: #9d4edd; 
            --border: rgba(157, 78, 221, 0.4); 
            --green: #ccff00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* --- STAGE 1: ENTRY GATEWAY (VISUAL MATCH) --- */
        #gateway { display: flex; flex-direction: column; align-items: center; width: 100%; position: absolute; z-index: 100; }
        .gate-card { width: 100%; max-width: 550px; padding: 60px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .entry-logo { 
            width: 160px; height: 160px; margin-bottom: 50px; background: white; 
            border-radius: 35px; padding: 15px; box-shadow: 0 0 30px rgba(157, 78, 221, 0.5); object-fit: contain; 
        }
        h2 { font-size: 42px; letter-spacing: 5px; font-weight: 700; margin-bottom: 50px; text-transform: uppercase; }

        /* INPUT SPACING FIX */
        .input-group { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 25px; align-items: center; }
        input.main-input { 
            background: rgba(0, 0, 0, 0.4); border: 2px solid var(--border); color: white; 
            padding: 22px; width: 100%; text-align: center; border-radius: 18px; outline: none; 
            font-size: 24px; letter-spacing: 2px; 
        }
        
        .action-btn { 
            background: transparent; border: 2px solid var(--purple); color: #b392f0; 
            padding: 14px 50px; border-radius: 100px; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s; 
        }
        .action-btn:hover { background: var(--purple); color: white; box-shadow: 0 0 20px var(--purple); }

        /* --- STAGE 2: HUB & PIN --- */
        #hub-ui { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width:100vw; }
        #pin-overlay { display: none; position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

        /* --- STAGE 3: MAIN INTERFACE --- */
        #main-ui { display: none; flex-direction: row; height: 100vh; width: 100vw; position: absolute; top:0; left:0; }
        aside { width: 100px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 25px; background: rgba(0,0,0,0.3); }
        .nav-icon { width: 60px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #444; cursor: pointer; transition: 0.2s; }
        .nav-icon.active { background: var(--purple); color: white; box-shadow: 0 0 15px var(--purple); }
        
        main { flex-grow: 1; padding: 40px; overflow: auto; background: radial-gradient(circle at center, #11101a 0%, #0b0a14 100%); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        /* --- GAME ENGINE --- */
        #gameCanvas { background: #020202; border: 3px solid var(--green); display: none; margin: 0 auto; border-radius: 15px; cursor: crosshair; box-shadow: 0 0 40px rgba(204, 255, 0, 0.1); }
        #simulation-screen { background: #000; color: var(--green); font-family: 'Courier New', Courier, monospace; padding: 25px; border-radius: 15px; height: 420px; border: 1px solid var(--green); margin-bottom: 20px; overflow-y: auto; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="gateway">
        <div class="gate-card">
            <img src="logo.png" class="entry-logo" onerror="this.src='https://i.ibb.co/LzNfX8S/netlink-logo.png'">
            <h2>Netlink Enterprise</h2>
            <div class="input-group">
                <input type="password" id="gate-input" class="main-input" placeholder="SYSTEM CODE" autofocus>
                <button class="action-btn" onclick="checkGate()">Initialize</button>
            </div>
        </div>
    </div>

    <div id="hub-ui">
        <h2 style="margin-bottom: 50px; letter-spacing: 8px;">SELECT NODE</h2>
        <div class="input-group">
            <button class="action-btn" onclick="openPin()">Founder Manav</button>
            <button class="action-btn" style="border-color: #333; color: #333; cursor: not-allowed;">Director Colton</button>
        </div>
    </div>

    <div id="pin-overlay">
        <div class="gate-card">
            <h3 style="margin-bottom: 25px; color: var(--purple); letter-spacing: 3px;">IDENTITY VERIFICATION</h3>
            <div class="input-group">
                <input type="password" id="pin-input" class="main-input" placeholder="ENTER PIN">
                <button class="action-btn" onclick="verifyPin()">Verify</button>
                <button class="action-btn" style="border:none; font-size: 10px; color: #555;" onclick="document.getElementById('pin-overlay').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>

    <div id="main-ui">
        <aside>
            <div class="nav-icon active" onclick="showView('home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-icon" id="game-icon" onclick="showView('game-view', this)"><i class="fa-solid fa-crosshairs"></i></div>
            <div class="nav-icon" onclick="location.reload()"><i class="fa-solid fa-power-off"></i></div>
        </aside>
        <main>
            <div id="home" class="view-section active">
                <h1 style="font-size:52px; margin-bottom:20px; font-weight: 800;">Control Center</h1>
                <div style="padding: 20px; border-left: 4px solid var(--purple); background: rgba(157, 78, 221, 0.05);">
                    <p style="color: var(--purple); font-weight: bold; letter-spacing: 2px;">NODE: FOUNDER ACTIVE</p>
                    <p style="opacity: 0.6; margin-top: 10px;">Location: Cottleville, MO Protocol. Systems Nominal.</p>
                </div>
            </div>

            <div id="game-view" class="view-section">
                <h1 style="color:var(--green); margin-bottom:20px; letter-spacing: 2px;">PROTOTYPE 1: COMBAT</h1>
                <div id="simulation-screen">[SYSTEM]: Awaiting manual engine trigger...</div>
                <canvas id="gameCanvas" width="800" height="500"></canvas>
                <br>
                <button id="run-engine-btn" class="action-btn" style="border-color:var(--green); color:var(--green)" onclick="runEngine()">Run Engine</button>
            </div>
        </main>
    </div>

    <script>
        // --- NAVIGATION & SECURITY ---
        function checkGate() {
            if(document.getElementById('gate-input').value === "netlink2026") {
                document.getElementById('gateway').style.display = 'none';
                document.getElementById('hub-ui').style.display = 'flex';
            } else { alert("ACCESS DENIED: INVALID SYSTEM CODE"); }
        }

        function openPin() {
            document.getElementById('pin-overlay').style.display = 'flex';
            document.getElementById('pin-input').focus();
        }

        function verifyPin() {
            if(document.getElementById('pin-input').value === "314314") {
                document.getElementById('pin-overlay').style.display = 'none';
                document.getElementById('hub-ui').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
            } else { alert("SECURITY BREACH: INVALID PIN"); }
        }

        function showView(id, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        // --- PROTOTYPE 1 ENGINE ---
        function runEngine() {
            const screen = document.getElementById('simulation-screen');
            const canvas = document.getElementById('gameCanvas');
            document.getElementById('run-engine-btn').style.display = 'none';
            
            screen.innerHTML = "[SYSTEM]: INITIALIZING ASSETS...<br>";
            const logs = [
                "> Syncing Agent Sprites...",
                "> Loading Zombie AI Behaviors...",
                "> Mapping Mouse-Aim Input...",
                "> WASD Controls Online...",
                "> COMBAT READY."
            ];
            let i = 0;
            const interval = setInterval(() => {
                if(i < logs.length) { screen.innerHTML += `<span style="color:white">${logs[i]}</span><br>`; i++; }
                else {
                    clearInterval(interval);
                    setTimeout(() => { screen.style.display='none'; canvas.style.display='block'; startCombat(); }, 1000);
                }
            }, 500);
        }

        function startCombat() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            let player = { x: 400, y: 250, size: 35, speed: 5, angle: 0, score: 0 };
            let bullets = [], enemies = [], keys = {}, mouse = { x: 0, y: 0 };

            // Listeners
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });

            canvas.addEventListener('mousedown', () => {
                let dx = mouse.x - player.x;
                let dy = mouse.y - player.y;
                let angle = Math.atan2(dy, dx);
                bullets.push({ 
                    x: player.x, 
                    y: player.y, 
                    vx: Math.cos(angle) * 10, 
                    vy: Math.sin(angle) * 10 
                });
            });

            function spawnEnemy() {
                if(enemies.length < 12) {
                    const side = Math.floor(Math.random() * 4);
                    let x, y;
                    if(side === 0) { x = Math.random() * canvas.width; y = -30; }
                    else if(side === 1) { x = canvas.width + 30; y = Math.random() * canvas.height; }
                    else if(side === 2) { x = Math.random() * canvas.width; y = canvas.height + 30; }
                    else { x = -30; y = Math.random() * canvas.height; }
                    enemies.push({ x, y, size: 32, speed: 1.4 + (player.score / 500) });
                }
            }
            setInterval(spawnEnemy, 1800);

            function update() {
                // WASD Movement
                if(keys['KeyW'] && player.y > 20) player.y -= player.speed;
                if(keys['KeyS'] && player.y < canvas.height - 20) player.y += player.speed;
                if(keys['KeyA'] && player.x > 20) player.x -= player.speed;
                if(keys['KeyD'] && player.x < canvas.width - 20) player.x += player.speed;

                // Aiming
                player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

                // Bullets logic
                bullets.forEach((b, i) => {
                    b.x += b.vx; b.y += b.vy;
                    if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
                });

                // Enemies logic
                enemies.forEach((e, ei) => {
                    let dx = player.x - e.x;
                    let dy = player.y - e.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    e.x += (dx/dist) * e.speed;
                    e.y += (dy/dist) * e.speed;

                    // Bullet vs Zombie
                    bullets.forEach((b, bi) => {
                        if(Math.hypot(b.x - e.x, b.y - e.y) < 20) {
                            enemies.splice(ei, 1); bullets.splice(bi, 1);
                            player.score += 25;
                        }
                    });

                    // Zombie vs Player
                    if(Math.hypot(player.x - e.x, player.y - e.y) < 25) {
                        alert("NODE COMPROMISED\nScore: " + player.score);
                        location.reload();
                    }
                });
            }

            function draw() {
                ctx.fillStyle = '#020202'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw Grid (Technical Look)
                ctx.strokeStyle = '#0a0a0a';
                ctx.lineWidth = 1;
                for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
                for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

                // 1. Draw Player (Asset: Sunglasses Agent)
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);
                // Body (Red shirt)
                ctx.fillStyle = '#b52f2f'; ctx.fillRect(-15, -12, 30, 24); 
                // Head (Skin)
                ctx.fillStyle = '#e2ab86'; ctx.fillRect(-8, -10, 20, 20); 
                // Sunglasses
                ctx.fillStyle = '#000'; ctx.fillRect(4, -8, 10, 4); 
                // Gun
                ctx.fillStyle = '#333'; ctx.fillRect(10, 2, 15, 6);
                ctx.restore();

                // 2. Draw Bullets (Glowing Yellow)
                bullets.forEach(b => {
                    ctx.shadowBlur = 10; ctx.shadowColor = "yellow";
                    ctx.fillStyle = "yellow"; ctx.fillRect(b.x-2, b.y-2, 6, 6);
                    ctx.shadowBlur = 0;
                });

                // 3. Draw Zombies (Asset: Bloody Green Pixel)
                enemies.forEach(e => {
                    ctx.fillStyle = '#659c6c'; ctx.fillRect(e.x-16, e.y-16, 32, 32); // Skin
                    ctx.fillStyle = '#9e2d2d'; ctx.fillRect(e.x-8, e.y-12, 12, 8); // Blood
                    ctx.fillStyle = '#3e2723'; ctx.fillRect(e.x-16, e.y+5, 32, 10); // Pants
                });

                // HUD
                ctx.fillStyle = var(--green); ctx.font = "bold 22px monospace";
                ctx.fillText(`SCORE: ${player.score}`, 30, 40);

                update();
                requestAnimationFrame(draw);
            }
            draw();
        }

        // Global Key Binds for Login
        document.getElementById('gate-input').addEventListener('keypress', e => { if(e.key === 'Enter') checkGate(); });
        document.getElementById('pin-input').addEventListener('keypress', e => { if(e.key === 'Enter') verifyPin(); });
    </script>
</body>
</html>
