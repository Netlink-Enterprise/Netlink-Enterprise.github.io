<!DOCTYPE html>
<html>
<head>
    <title>MKC Unlock System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1a1a1a, #000);
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .page {
            display: none;
            height: 100vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .active {
            display: flex;
        }

        /* LOGO */
        .logo {
            width: 160px;
            border-radius: 20px;
            box-shadow: 0 0 20px #00ffcc;
            margin-bottom: 20px;
        }

        /* BUTTONS */
        button {
            padding: 12px 25px;
            margin-top: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .green { background: #00ff88; }
        .blue { background: #2196F3; color: white; }
        .red { background: #ff3b3b; color: white; }

        button:hover {
            transform: scale(1.05);
        }

        input {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            text-align: center;
        }

        /* LOADING BAR */
        .bar {
            width: 60%;
            height: 20px;
            background: #222;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 20px;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffcc, #0077ff);
            animation: load 3s forwards;
        }

        @keyframes load {
            to { width: 100%; }
        }

        /* SHAKING LOCK */
        .shake {
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        #message {
            color: #ff5555;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- ================= LOADING SCREEN ================= -->
<div id="loading" class="page active">
    <h1>Initializing System...</h1>
    <div class="bar">
        <div class="fill"></div>
    </div>
</div>

<!-- ================= HOME ================= -->
<div id="home" class="page">

    <!-- 🔥 YOUR IMAGE (NO RENAMING REQUIRED) -->
    <img class="logo" src="YOUR-IMAGE-FILE.png">

    <h1>MKC SYSTEM</h1>
    <p>Secure Access Required</p>

    <button class="green" onclick="goLogin()">START ACCESS</button>
</div>

<!-- ================= LOGIN ================= -->
<div id="login" class="page">

    <div id="lockBox">
        <h2>🔒 Enter Access Code</h2>

        <input type="password" id="password" placeholder="000000">

        <br>

        <button class="blue" onclick="checkPassword()">
            UNLOCK
        </button>

        <p id="message"></p>

        <button class="red" onclick="goHome()">EXIT</button>
    </div>
</div>

<!-- ================= SECRET ================= -->
<div id="secret" class="page">
    <h1>ACCESS GRANTED ✅</h1>
    <p>Welcome, Operator.</p>

    <button class="green" onclick="goHome()">RETURN</button>
</div>

<script>
    // fake loading delay
    setTimeout(() => {
        document.getElementById("loading").classList.remove("active");
        document.getElementById("home").classList.add("active");
    }, 3000);

    function show(page) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(page).classList.add("active");
    }

    function goLogin() {
        show("login");
    }

    function goHome() {
        show("home");
    }

    function checkPassword() {
        const pass = document.getElementById("password").value;
        const box = document.getElementById("lockBox");

        if (pass === "000000") {
            show("secret");
        } else {
            document.getElementById("message").innerText = "ACCESS DENIED";

            // shake effect like game lock
            box.classList.add("shake");
            setTimeout(() => box.classList.remove("shake"), 300);
        }
    }
</script>

</body>
</html>
