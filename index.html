<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlink-Enterprise | Tactical Terminal</title>
    <style>
        :root {
            --primary: #00ffcc; 
            --founder-glow: #00d9ff; 
            --cofounder-glow: #ff00ff; 
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- LOGIN --- */
        #login-screen {
            margin-top: 100px;
            text-align: center;
            background: #111;
            padding: 40px;
            border: 2px solid var(--primary);
        }

        input {
            background: #000;
            border: 1px solid #333;
            color: var(--primary);
            padding: 12px;
            margin: 10px 0;
            text-align: center;
            outline: none;
        }

        /* --- DASHBOARD --- */
        #dashboard { display: none; width: 95%; max-width: 1100px; padding: 20px; }
        .profile-container { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .card { background: #111; border: 1px solid #222; padding: 20px; width: 220px; text-align: center; }
        .active-session { display: none; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; border-top: 2px solid #222; padding-top: 20px; }
        .section-box { background: #080808; border: 1px solid #333; padding: 25px; min-height: 350px; }

        .btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn:hover { background: var(--primary); color: black; }

        /* --- GAME --- */
        #game-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas { background: #000; border: 2px solid #333; }

        .msg-log {
            background: #000;
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border: 1px solid #222;
            color: #00ff00;
            margin-bottom: 10px;
        }

        #score-display {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 24px;
            color: var(--primary);
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="letter-spacing: 5px;">SYSTEM ACCESS</h1>
        <input type="password" id="entry-code" placeholder="ACCESS CODE" onkeydown="if(event.key==='Enter')checkEntry()">
        <button class="btn" onclick="checkEntry()">INITIALIZE</button>
    </div>

    <div id="dashboard">
        <div class="profile-container">
            <div class="card" style="border-color: var(--founder-glow)">
                <button class="btn" onclick="loginProfile('Founder', '314314')">ACCESS</button>
                <div style="margin-top:10px;">Manav Bisht</div>
            </div>
            <div class="card" style="border-color: var(--cofounder-glow)">
                <button class="btn" onclick="loginProfile('Co-Founder', '444444')">ACCESS</button>
                <div style="margin-top:10px;">Keshav</div>
            </div>
            <div class="card">
                <button class="btn" onclick="loginProfile('Director', '55555')">ACCESS</button>
                <div style="margin-top:10px;">Colton</div>
            </div>
        </div>

        <div id="session-ui" class="active-session">
            <div class="section-box">
                <h3 id="user-display">Actions</h3>
                <div id="founder-tools" style="display:none;">
                    <button class="btn" onclick="document.getElementById('profit-controls').style.display='block'">EMPLOYEE MANAGEMENT</button>
                    <div id="profit-controls" style="display:none; margin-top:15px; border:1px solid #444; padding:10px;">
                        <input type="text" id="emp-name" placeholder="Employee Name">
                        <input type="number" id="emp-amount" placeholder="Amount ($)">
                        <button class="btn" onclick="processPayment()">AUTHORIZE</button>
                    </div>
                </div>
                <div id="game-access" style="display:none;">
                    <button class="btn" style="border-color: #ff4444; color: #ff4444; margin-top: 20px;" onclick="startGame()">PROTOTYPE 1 GAME</button>
                </div>
                <button class="btn" style="border-color:#555; color:#555; margin-top:40px;" onclick="location.reload()">LOGOUT</button>
            </div>

            <div class="section-box">
                <h3>Secure Messaging</h3>
                <div class="msg-log" id="msg-log"></div>
                <input type="text" id="msg-input" placeholder="Type message..." style="width: 70%;" onkeydown="if(event.key==='Enter')postMsg()">
                <button class="btn" style="width: 25%; margin:0;" onclick="postMsg()">SEND</button>
            </div>
        </div>
    </div>

    <!-- GAME OVERLAY -->
    <div id="game-container">
        <div id="score-display">SCORE: 0</div>
        <h2 id="game-status" style="color: #fff; margin:0;">ZOMBIE OUTBREAK: PROTOTYPE 1</h2>
        <p id="game-subtext" style="font-size: 12px; color: #888;">WASD to Move | Space to Shoot</p>
        <canvas id="zombieCanvas" width="600" height="450"></canvas>
        <button class="btn" style="width: 200px;" onclick="closeGame()">EXIT</button>
    </div>

    <script>
        let currentRole = "";
        
        function checkEntry() {
            if (document.getElementById('entry-code').value === "201400") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else alert("DENIED");
        }

        function loginProfile(role, pin) {
            let pass = prompt("Enter PIN:");
            if (pass === pin) {
                currentRole = role;
                document.getElementById('session-ui').style.display = 'grid';
                document.getElementById('user-display').innerText = role + " Console";
                document.getElementById('founder-tools').style.display = (role === 'Founder') ? 'block' : 'none';
                document.getElementById('game-access').style.display = (role === 'Founder' || role === 'Director') ? 'block' : 'none';
                logMsg("Session started: " + role);
            } else alert("INVALID");
        }

        function processPayment() {
            let n = document.getElementById('emp-name').value;
            let a = document.getElementById('emp-amount').value;
            if(n && a) {
                logMsg("FUNDS: $" + a + " -> " + n);
                document.getElementById('emp-name').value = ""; document.getElementById('emp-amount').value = "";
            }
        }

        function postMsg() {
            let i = document.getElementById('msg-input');
            if (i.value) { logMsg(currentRole + ": " + i.value); i.value = ""; }
        }

        function logMsg(t) {
            let l = document.getElementById('msg-log');
            l.innerHTML += "<br>> " + t;
            l.scrollTop = l.scrollHeight;
        }

        // --- GAME ENGINE ---
        const canvas = document.getElementById('zombieCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false;
        let isDead = false;
        let score = 0;
        let player = { x: 290, y: 400, w: 20, h: 20, speed: 4 };
        let zombies = [];
        let bullets = [];
        let keys = {};

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (isDead && e.code === 'KeyR') resetGame();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            document.getElementById('game-container').style.display = 'flex';
            resetGame();
        }

        function resetGame() {
            gameRunning = true;
            isDead = false;
            score = 0;
            updateScoreDisplay();
            zombies = [];
            bullets = [];
            player = { x: 290, y: 400, w: 20, h: 20, speed: 4 };
            document.getElementById('game-status').innerText = "ZOMBIE OUTBREAK: PROTOTYPE 1";
            document.getElementById('game-status').style.color = "#fff";
            document.getElementById('game-subtext').innerText = "WASD to Move | Space to Shoot";
            requestAnimationFrame(gameLoop);
        }

        function updateScoreDisplay() {
            document.getElementById('score-display').innerText = "SCORE: " + score;
        }

        function closeGame() { gameRunning = false; document.getElementById('game-container').style.display = 'none'; }

        function triggerDeath(reason) {
            gameRunning = false;
            isDead = true;
            document.getElementById('game-status').innerText = "YOU DIED: " + reason;
            document.getElementById('game-status').style.color = "red";
            document.getElementById('game-subtext').innerText = "FINAL SCORE: " + score + " | PRESS 'R' TO RESTART";
        }

        function gameLoop() {
            if (!gameRunning) return;
            ctx.fillStyle = "black"; ctx.fillRect(0,0,600,450);

            // Movement
            if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['KeyD']) && player.x < 580) player.x += player.speed;
            if ((keys['ArrowUp'] || keys['KeyW']) && player.y > 200) player.y -= player.speed;
            if ((keys['ArrowDown'] || keys['KeyS']) && player.y < 420) player.y += player.speed;

            // Shooting
            if (keys['Space']) {
                if (bullets.length === 0 || bullets[bullets.length-1].y < player.y - 40) {
                    bullets.push({x: player.x + 8, y: player.y, w: 4, h: 10});
                }
            }

            // Draw Player
            ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, player.w, player.h);

            // Bullets
            bullets.forEach((b, bi) => {
                b.y -= 7;
                ctx.fillStyle = "yellow"; ctx.fillRect(b.x, b.y, b.w, b.h);
                if (b.y < 0) bullets.splice(bi, 1);
            });

            // Zombies logic
            if (Math.random() < 0.01) zombies.push({x: Math.random()*580, y: -20, w: 20, h: 20});
            zombies.forEach((z, zi) => {
                z.y += 1.2;
                ctx.fillStyle = "#39ff14"; ctx.fillRect(z.x, z.y, z.w, z.h);

                // Hit by bullet
                bullets.forEach((b, bi) => {
                    if (b.x < z.x + z.w && b.x + b.w > z.x && b.y < z.y + z.h && b.y + b.h > z.y) {
                        zombies.splice(zi, 1); 
                        bullets.splice(bi, 1);
                        score += 100;
                        updateScoreDisplay();
                    }
                });

                // Fail conditions
                if (z.y > 430) triggerDeath("BASE OVERRUN");
                if (z.x < player.x + player.w && z.x + z.w > player.x && z.y < player.y + player.h && z.y + z.h > player.y) {
                    triggerDeath("EATEN ALIVE");
                }
            });

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
