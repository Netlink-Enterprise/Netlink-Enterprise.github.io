<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netlink Enterprise | Secure Terminal</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --accent: #007bff;
            --text: #eee;
            --gold: #d4af37;
        }

        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* Matrix/Terminal feel */
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .page {
            display: none;
            width: 90%;
            max-width: 500px;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: var(--panel);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.1);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #444;
            border-radius: 4px;
            color: #00ff00; /* Hacker green text */
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            background: #222;
            color: white;
            transition: 0.2s;
        }

        button:hover { background: #333; border: 1px solid var(--accent); }
        .primary-btn { background: var(--accent); }
        
        #btn-founder { border: 1px solid var(--gold); color: var(--gold); }

        .content-box {
            text-align: left;
            background: #000;
            padding: 15px;
            border-radius: 4px;
            margin-top: 10px;
            border-left: 2px solid var(--accent);
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<!-- GATE 1: SYSTEM ENTRY -->
<div id="gate" class="page" style="display:flex;">
    <div class="panel">
        <h1 style="color: var(--accent);">SYSTEM LOCKED</h1>
        <p>Enter Master Entry Code</p>
        <input type="password" id="entryCode" placeholder="MASTER CODE" onkeypress="if(event.key==='Enter') verifyEntry()">
        <button class="primary-btn" onclick="verifyEntry()">UNLOCK SYSTEM</button>
    </div>
</div>

<!-- GATE 2: ROLE LOGIN -->
<div id="login" class="page">
    <div class="panel">
        <h1>NETLINK IDENTITY</h1>
        <p>Verify Personnel Code</p>
        <input type="password" id="roleCode" placeholder="PERSONNEL CODE" onkeypress="if(event.key==='Enter') login()">
        <button class="primary-btn" onclick="login()">VERIFY ID</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
    <div class="panel">
        <h2>COMMAND CENTER</h2>
        <p id="accessLevel" style="color: #888;"></p>
        
        <button id="btn-founder" onclick="openPage('founder')">FOUNDER PANEL</button>
        <button id="btn-cofounder" onclick="openPage('cofounder')">CO-FOUNDER VIEW</button>
        <button id="btn-director" onclick="openPage('director')">DIRECTOR INTEL</button>
        <button id="btn-employee" onclick="openPage('employee')">EMPLOYEE TASKS</button>
        
        <button onclick="location.reload()" style="color: #ff4d4d; background: transparent; border: 1px solid #444;">DISCONNECT</button>
    </div>
</div>

<!-- PAGES -->
<div id="founder" class="page">
    <div class="panel">
        <h2>FOUNDER CONTROL</h2>
        <textarea id="annInput" placeholder="Global Announcement..."></textarea>
        <button class="primary-btn" onclick="postData('ann')">BROADCAST</button>
        <textarea id="assInput" placeholder="Employee Task..."></textarea>
        <button class="primary-btn" onclick="postData('ass')">ASSIGN TASK</button>
        <button onclick="openPage('dashboard')">RETURN</button>
    </div>
</div>

<div id="employee" class="page">
    <div class="panel">
        <h2>ASSIGNMENTS</h2>
        <div id="assDisplay" class="content-box">No tasks found.</div>
        <button onclick="openPage('dashboard')">RETURN</button>
    </div>
</div>

<div id="cofounder" class="page"><div class="panel"><h2>CO-FOUNDER</h2><div id="cofAnn" class="content-box"></div><button onclick="openPage('dashboard')">RETURN</button></div></div>
<div id="director" class="page"><div class="panel"><h2>DIRECTOR</h2><div id="dirAnn" class="content-box"></div><button onclick="openPage('dashboard')">RETURN</button></div></div>

<script>
    // 1. MASTER ENTRY VERIFICATION
    function verifyEntry() {
        const code = document.getElementById("entryCode").value;
        if (code === "201400") {
            openPage('login');
        } else {
            alert("ACCESS DENIED: INCORRECT MASTER CODE");
        }
    }

    // 2. ROLE LOGIN
    function login() {
        const code = document.getElementById("roleCode").value;
        const btns = ["btn-founder", "btn-cofounder", "btn-director", "btn-employee"];
        
        // Hide all first
        btns.forEach(id => document.getElementById(id).style.display = "none");

        if (code === "314314") {
            // FOUNDER: SHOW EVERYTHING
            btns.forEach(id => document.getElementById(id).style.display = "block");
            document.getElementById("accessLevel").innerText = "LEVEL: FOUNDER";
        } else if (code === "444444") {
            document.getElementById("btn-cofounder").style.display = "block";
            document.getElementById("btn-employee").style.display = "block";
            document.getElementById("accessLevel").innerText = "LEVEL: CO-FOUNDER";
        } else if (code === "555555") {
            document.getElementById("btn-director").style.display = "block";
            document.getElementById("btn-employee").style.display = "block";
            document.getElementById("accessLevel").innerText = "LEVEL: DIRECTOR";
        } else {
            alert("IDENTITY NOT RECOGNIZED");
            return;
        }
        openPage('dashboard');
    }

    function openPage(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        
        // Load data when entering pages
        if(id === 'employee') document.getElementById("assDisplay").innerHTML = localStorage.getItem("net_ass") || "Clear.";
        if(id === 'cofounder') document.getElementById("cofAnn").innerHTML = localStorage.getItem("net_ann") || "No data.";
        if(id === 'director') document.getElementById("dirAnn").innerHTML = localStorage.getItem("net_ann") || "No data.";
    }

    function postData(type) {
        if(type === 'ann') {
            localStorage.setItem("net_ann", document.getElementById("annInput").value);
            document.getElementById("annInput").value = "";
        } else {
            localStorage.setItem("net_ass", document.getElementById("assInput").value);
            document.getElementById("assInput").value = "";
        }
        alert("TRANSMISSION SUCCESSFUL");
    }
</script>

</body>
</html>
