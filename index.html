<!DOCTYPE html>
<html>
<head>
    <title>Netlink-Enterprise</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #111, #000);
            color: white;
            text-align: center;
        }

        .page {
            display: none;
            height: 100vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .active {
            display: flex;
        }

        img {
            width: 160px;
            border-radius: 20px;
            box-shadow: 0 0 20px cyan;
            margin-bottom: 15px;
        }

        h1 {
            letter-spacing: 2px;
        }

        button {
            padding: 12px 25px;
            margin-top: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .green { background: #00ff88; }
        .blue { background: #2196F3; color: white; }
        .red { background: #ff3b3b; color: white; }

        button:hover {
            transform: scale(1.05);
        }

        input {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            text-align: center;
        }

        #message {
            color: red;
            margin-top: 10px;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            margin: 10px;
            width: 250px;
            box-shadow: 0 0 10px #00ffcc;
        }

        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .shake {
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>

<body>

<!-- ================= HOME ================= -->
<div id="home" class="page active">

    <!-- YOUR IMAGE (NO RENAMING REQUIRED) -->
    <img src="YOUR-IMAGE-FILE.png">

    <h1>NETLINK-ENTERPRISE</h1>
    <p>Secure System Access Required</p>

    <button class="green" onclick="goLogin()">START ACCESS</button>
</div>

<!-- ================= LOGIN ================= -->
<div id="login" class="page">

    <div id="box">
        <h2>🔒 ENTER ACCESS CODE</h2>

        <!-- 🔥 FIX: password is hidden properly -->
        <input type="password" id="password" placeholder="Enter Access Code">

        <br>

        <button class="blue" onclick="checkPassword()">UNLOCK</button>

        <p id="message"></p>

        <button class="red" onclick="goHome()">BACK</button>
    </div>
</div>

<!-- ================= EMPLOYEE PAGE ================= -->
<div id="employee" class="page">

    <h1>👥 INTERNAL SYSTEM ACCESS GRANTED</h1>
    <p>Welcome to Netlink-Enterprise</p>

    <div class="row">

        <div class="card">
            <h3>Founder</h3>
            <p>System Owner</p>
        </div>

        <div class="card">
            <h3>Co-Founder</h3>
            <p>Technical Lead</p>
        </div>

        <div class="card">
            <h3>Employees</h3>
            <p>Engineering & Development Team</p>
        </div>

    </div>

    <button class="green" onclick="goHome()">LOG OUT</button>
</div>

<script>
    function show(page) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(page).classList.add("active");
    }

    function goHome() {
        show("home");
    }

    function goLogin() {
        show("login");
    }

    function checkPassword() {
        const pass = document.getElementById("password").value;
        const box = document.getElementById("box");

        if (pass === "201400") {
            show("employee");
        } else {
            document.getElementById("message").innerText = "ACCESS DENIED";

            box.classList.add("shake");
            setTimeout(() => box.classList.remove("shake"), 300);
        }
    }
</script>

</body>
</html>
