<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlink | Enterprise Command</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0a14; 
            --purple: #9d4edd; 
            --border: rgba(157, 78, 221, 0.4); 
            --green: #ccff00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* --- STAGE 1: ENTRY GATEWAY --- */
        #gateway { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            position: absolute; 
            z-index: 5; 
        }
        .gate-card { width: 100%; max-width: 550px; padding: 60px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .entry-logo { 
            width: 160px; height: 160px; margin-bottom: 50px; background: white; 
            border-radius: 35px; padding: 15px; box-shadow: 0 0 30px rgba(157, 78, 221, 0.5); object-fit: contain; 
        }
        h2 { font-size: 42px; letter-spacing: 5px; font-weight: 700; margin-bottom: 50px; text-transform: uppercase; }

        .input-group { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 25px; align-items: center; }
        
        input.main-input { 
            background: rgba(0, 0, 0, 0.4); border: 2px solid var(--border); color: white; 
            padding: 22px; width: 100%; text-align: center; border-radius: 18px; outline: none; 
            font-size: 24px; letter-spacing: 2px; 
        }
        
        .action-btn { 
            background: transparent; border: 2px solid var(--purple); color: #b392f0; 
            padding: 14px 50px; border-radius: 100px; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s; 
        }
        .action-btn:hover { background: var(--purple); color: white; box-shadow: 0 0 20px var(--purple); }

        /* --- OVERLAYS (STRICT POINTER CONTROL) --- */
        #hub-ui, #pin-overlay, #main-ui { 
            display: none; 
            pointer-events: none; /* Invisible layers won't block the gateway button */
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* Show Class */
        .active-view { 
            display: flex !important; 
            pointer-events: auto !important; 
        }

        #hub-ui { flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #pin-overlay { background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

        /* --- DASHBOARD --- */
        #main-ui { flex-direction: row; z-index: 200; }
        aside { width: 100px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 25px; background: rgba(0,0,0,0.2); }
        .nav-icon { width: 60px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #444; cursor: pointer; transition: 0.2s; }
        .nav-icon.active { background: var(--purple); color: white; box-shadow: 0 0 10px var(--purple); }
        
        main { flex-grow: 1; padding: 40px; overflow: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        #gameCanvas { background: #050505; border: 3px solid var(--green); display: none; margin: 0 auto; border-radius: 15px; cursor: crosshair; }
        #simulation-screen { background: #000; color: var(--green); font-family: 'Courier New', monospace; padding: 20px; border-radius: 15px; height: 400px; border: 1px solid var(--green); margin-bottom: 20px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="gateway">
        <div class="gate-card">
            <img src="logo.png" class="entry-logo" onerror="this.src='https://i.ibb.co/LzNfX8S/netlink-logo.png'">
            <h2>Netlink Enterprise</h2>
            <div class="input-group">
                <input type="password" id="gate-input" class="main-input" placeholder="SYSTEM CODE" autofocus>
                <button class="action-btn" onclick="checkGate()">Initialize</button>
            </div>
        </div>
    </div>

    <div id="hub-ui">
        <h2 style="margin-bottom: 50px; letter-spacing: 5px;">SELECT NODE</h2>
        <div class="input-group">
            <button class="action-btn" onclick="openPin()">Founder Manav</button>
        </div>
    </div>

    <div id="pin-overlay">
        <div class="gate-card">
            <h3 style="margin-bottom: 25px; color: var(--purple); letter-spacing: 2px;">SECURE ACCESS</h3>
            <div class="input-group">
                <input type="password" id="pin-input" class="main-input" placeholder="ENTER PIN">
                <button class="action-btn" onclick="verifyPin()">Verify Identity</button>
            </div>
        </div>
    </div>

    <div id="main-ui">
        <aside>
            <div class="nav-icon active" onclick="showView('home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-icon" id="game-icon" onclick="showView('game-view', this)"><i class="fa-solid fa-crosshairs"></i></div>
            <div class="nav-icon" onclick="location.reload()"><i class="fa-solid fa-power-off"></i></div>
        </aside>
        <main>
            <div id="home" class="view-section active">
                <h1 style="font-size:52px; margin-bottom:20px; font-weight: 800;">Control Center</h1>
                <p style="color: var(--purple); font-weight: bold; letter-spacing: 1px;">NODE STATUS: ONLINE</p>
            </div>

            <div id="game-view" class="view-section">
                <h1 style="color:var(--green); margin-bottom:20px">Prototype 1 Combat Sim</h1>
                <div id="simulation-screen">[SYSTEM]: Awaiting User Interaction...</div>
                <canvas id="gameCanvas" width="800" height="500"></canvas>
                <br>
                <button id="run-engine-btn" class="action-btn" style="border-color:var(--green); color:var(--green)" onclick="runEngine()">Run Engine</button>
            </div>
        </main>
    </div>

    <script>
        // --- NAVIGATION LOGIC ---
        function checkGate() {
            if(document.getElementById('gate-input').value === "netlink2026") {
                document.getElementById('gateway').style.display = 'none';
                document.getElementById('hub-ui').classList.add('active-view');
            } else { alert("ACCESS DENIED"); }
        }

        function openPin() {
            document.getElementById('pin-overlay').classList.add('active-view');
            document.getElementById('pin-input').focus();
        }

        function verifyPin() {
            if(document.getElementById('pin-input').value === "314314") {
                document.getElementById('pin-overlay').classList.remove('active-view');
                document.getElementById('hub-ui').classList.remove('active-view');
                document.getElementById('main-ui').classList.add('active-view');
            } else { alert("INVALID PIN"); }
        }

        function showView(id, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        // --- GAME ENGINE ---
        function runEngine() {
            const screen = document.getElementById('simulation-screen');
            const canvas = document.getElementById('gameCanvas');
            document.getElementById('run-engine-btn').style.display = 'none';
            screen.innerHTML = "[SYSTEM]: Calibrating WASD & Mouse Aim...<br>";
            setTimeout(() => { 
                screen.style.display='none'; 
                canvas.style.display='block'; 
                startCombat(); 
            }, 1000);
        }

        function startCombat() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            let player = { x: 400, y: 250, size: 35, speed: 5, angle: 0, score: 0 };
            let bullets = [], enemies = [], keys = {}, mouse = { x: 0, y: 0 };

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });

            canvas.addEventListener('mousedown', () => {
                let dx = mouse.x - player.x;
                let dy = mouse.y - player.y;
                let angle = Math.atan2(dy, dx);
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10 });
            });

            function spawnEnemy() {
                enemies.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: 30, speed: 1.5 });
            }
            setInterval(spawnEnemy, 1800);

            function update() {
                if(keys['KeyW'] && player.y > 0) player.y -= player.speed;
                if(keys['KeyS'] && player.y < canvas.height) player.y += player.speed;
                if(keys['KeyA'] && player.x > 0) player.x -= player.speed;
                if(keys['KeyD'] && player.x < canvas.width) player.x += player.speed;

                player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

                bullets.forEach((b, i) => {
                    b.x += b.vx; b.y += b.vy;
                    if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
                });

                enemies.forEach((e, ei) => {
                    let dx = player.x - e.x; let dy = player.y - e.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    e.x += (dx/dist) * e.speed; e.y += (dy/dist) * e.speed;

                    bullets.forEach((b, bi) => {
                        if(Math.hypot(b.x - e.x, b.y - e.y) < 20) {
                            enemies.splice(ei, 1); bullets.splice(bi, 1); player.score += 20;
                        }
                    });

                    if(Math.hypot(player.x - e.x, player.y - e.y) < 25) {
                        alert("NODE COMPROMISED. Final Score: " + player.score); location.reload();
                    }
                });
            }

            function draw() {
                ctx.fillStyle = '#050505'; ctx.fillRect(0,0,800,500);
                
                // Draw Agent (Asset Match)
                ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
                ctx.fillStyle = '#b52f2f'; ctx.fillRect(-15, -12, 30, 24); // Shirt
                ctx.fillStyle = '#e2ab86'; ctx.fillRect(-10, -10, 20, 20); // Head
                ctx.fillStyle = 'black'; ctx.fillRect(2, -8, 10, 4); // Shades
                ctx.restore();

                // Draw Zombies (Asset Match)
                enemies.forEach(e => {
                    ctx.fillStyle = '#659c6c'; ctx.fillRect(e.x-15, e.y-15, 30, 30); // Skin
                    ctx.fillStyle = '#9e2d2d'; ctx.fillRect(e.x-5, e.y-10, 10, 5); // Blood
                });

                // Draw Bullets
                ctx.fillStyle = 'yellow';
                bullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 6, 6));

                ctx.fillStyle = '#ccff00'; ctx.font = "20px monospace";
                ctx.fillText("SCORE: " + player.score, 20, 35);

                update();
                requestAnimationFrame(draw);
            }
            draw();
        }

        // Handle Enter Keys
        document.getElementById('gate-input').addEventListener('keypress', e => { if(e.key==='Enter') checkGate(); });
        document.getElementById('pin-input').addEventListener('keypress', e => { if(e.key==='Enter') verifyPin(); });
    </script>
</body>
</html>
