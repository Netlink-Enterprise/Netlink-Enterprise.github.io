<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlink-Enterprise | Secure Management</title>
    <style>
        :root {
            --primary: #00ffcc; 
            --founder-glow: #00d9ff; 
            --cofounder-glow: #ff00ff; 
            --bg-dark: #050505;
            --card-bg: #111111;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- ENTRY SCREEN --- */
        #login-screen {
            text-align: center;
            background: #111;
            padding: 50px;
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            border-radius: 8px;
        }

        input {
            background: #000;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            font-size: 1.2rem;
            text-align: center;
            margin: 15px 0;
            outline: none;
            width: 200px;
        }

        /* --- DASHBOARD --- */
        #dashboard {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .dashboard-container {
            display: flex;
            gap: 25px;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .profile-card {
            background: var(--card-bg);
            border: 2px solid #222;
            padding: 35px;
            width: 250px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 4px;
        }

        .elite-card { width: 280px; position: relative; }
        .founder-card { border: 3px solid var(--founder-glow); }
        .cofounder-card { border: 3px solid var(--cofounder-glow); }

        .name-label {
            display: block;
            margin-top: 15px;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .badge { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; display: block; color: #666; }

        .action-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .action-btn:hover { background: var(--primary); color: #000; }
        
        .founder-btn { border-color: var(--founder-glow); color: var(--founder-glow); }
        .founder-btn:hover { background: var(--founder-glow); color: black; }
        
        .cofounder-btn { border-color: var(--cofounder-glow); color: var(--cofounder-glow); }
        .cofounder-btn:hover { background: var(--cofounder-glow); color: black; }

        /* --- FOUNDER ONLY PROFIT PANEL --- */
        #master-profit-controls {
            display: none; 
            margin-top: 50px;
            background: #0a0a0a;
            border: 2px solid var(--founder-glow);
            padding: 30px;
            width: 480px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0, 217, 255, 0.1);
        }

        .money-display {
            font-size: 4rem;
            color: #28a745;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            text-shadow: 0 0 15px rgba(40, 167, 69, 0.3);
        }

        .profit-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 8px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.2s;
        }

        .profit-btn:hover { transform: scale(1.05); background: #218838; }

        .target-tag {
            color: var(--founder-glow);
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- STAGE 1: ENTRY GATE -->
    <div id="login-screen">
        <h1 style="letter-spacing: 8px; margin-bottom: 5px;">NETLINK</h1>
        <p style="color: #444; font-size: 0.8rem; letter-spacing: 2px;">ENTERPRISE EDITION</p>
        <input type="password" id="entry-code" placeholder="ACCESS CODE">
        <br>
        <button class="action-btn" onclick="checkEntry()">INITIALIZE SYSTEM</button>
    </div>

    <!-- STAGE 2: MASTER DASHBOARD -->
    <div id="dashboard">
        <h2 style="letter-spacing: 5px; color: #555; margin-bottom: 40px;">COMMAND TERMINAL v1.0</h2>
        
        <div class="dashboard-container">
            
            <!-- FOUNDER -->
            <div class="profile-card elite-card founder-card">
                <span class="badge" style="color: var(--founder-glow)">System Founder</span>
                <button class="action-btn founder-btn" onclick="accessProfile('Founder', '314314')">Login Profile</button>
                <span class="name-label" style="color: var(--founder-glow)">Manav Bisht</span>
            </div>

            <!-- CO-FOUNDER -->
            <div class="profile-card elite-card cofounder-card">
                <span class="badge" style="color: var(--cofounder-glow)">Co-Founder</span>
                <button class="action-btn cofounder-btn" onclick="accessProfile('Co-Founder', '444444')">Login Profile</button>
                <span class="name-label" style="color: var(--cofounder-glow)">Keshav</span>
            </div>

            <!-- DIRECTOR -->
            <div class="profile-card">
                <span class="badge">Director</span>
                <button class="action-btn" onclick="accessProfile('Director', '55555')">Login Profile</button>
                <span class="name-label">Colton</span>
            </div>

        </div>

        <!-- STAGE 3: FOUNDER-LOCKED MANAGEMENT TOOLS -->
        <div id="master-profit-controls">
            <span class="badge" style="color: var(--founder-glow); margin-bottom: 20px;">Master Finance Override</span>
            
            <button class="action-btn" style="width: auto; padding: 8px 25px; margin-bottom: 20px;" onclick="setEmployeeTarget()">
                ACCESS EMPLOYEE LEDGER
            </button>
            
            <div class="target-tag" id="target-display">Active Recipient: NONE</div>
            <div class="money-display" id="global-money">$0</div>
            
            <button class="profit-btn" onclick="transferMoney(100)">SEND $100</button>
            <button class="profit-btn" onclick="transferMoney(500)">SEND $500</button>
            
            <div style="margin-top: 20px;">
                <button class="action-btn" style="width: auto; border-color: #333; color: #333; font-size: 10px;" onclick="resetBalance()">WIPE LEDGER</button>
            </div>
        </div>

        <div style="margin: 50px 0; color: #333; cursor: pointer; font-size: 0.8rem;" onclick="location.reload()">DISCONNECT SESSION</div>
    </div>

    <script>
        let isFounder = false;
        let balance = 0;
        let currentTarget = "NONE";

        // Main Web Entry (201400)
        function checkEntry() {
            const entry = document.getElementById('entry-code').value;
            if (entry === "201400") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
            } else {
                alert("CRITICAL ERROR: INVALID SYSTEM ACCESS CODE.");
            }
        }

        // Profile Verification
        function accessProfile(role, correctPin) {
            const userPin = prompt("Enter Security PIN for " + role + ":");
            
            if (userPin === correctPin) {
                alert("ACCESS GRANTED. Welcome, " + role);
                
                // If Manav Bisht logs in, reveal the special money tools
                if (role === 'Founder') {
                    isFounder = true;
                    document.getElementById('master-profit-controls').style.display = 'block';
                } else {
                    isFounder = false;
                    document.getElementById('master-profit-controls').style.display = 'none';
                }
            } else {
                alert("SECURITY ALERT: INCORRECT PIN. ACCESS DENIED.");
            }
        }

        // Founder Feature: Set Employee Name
        function setEmployeeTarget() {
            if (!isFounder) return;
            const name = prompt("Enter your name (Employee):");
            if (name && name.trim() !== "") {
                currentTarget = name.toUpperCase();
                document.getElementById('target-display').innerText = "Active Recipient: " + currentTarget;
                balance = 0; // Reset balance for new person
                updateDisplay();
            }
        }

        // Founder Feature: Send Money Logic
        function transferMoney(amt) {
            if (!isFounder) {
                alert("DENIED: ONLY THE FOUNDER CAN AUTHORIZE PROFIT TRANSFERS.");
                return;
            }
            if (currentTarget === "NONE") {
                alert("ERROR: NO EMPLOYEE SELECTED. PLEASE SELECT EMPLOYEE FIRST.");
                return;
            }
            balance += amt;
            updateDisplay();
        }

        function resetBalance() {
            balance = 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('global-money').innerText = "$" + balance.toLocaleString();
        }
    </script>
</body>
</html>
