<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlink | Enterprise Command</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0a14; --purple: #9d4edd; --border: rgba(157, 78, 221, 0.4); --green: #ccff00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* --- GATEWAY --- */
        #gateway { display: flex; flex-direction: column; align-items: center; width: 100%; position: absolute; z-index: 100; background: var(--bg); height: 100vh; justify-content: center; }
        .gate-card { width: 100%; max-width: 550px; text-align: center; }
        .entry-logo { width: 160px; height: 160px; margin-bottom: 40px; background: white; border-radius: 35px; padding: 15px; box-shadow: 0 0 30px rgba(157, 78, 221, 0.5); object-fit: contain; }
        
        /* --- HUB --- */
        #hub-ui { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; position: absolute; z-index: 90; background: var(--bg); }
        .node-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 600px; padding: 20px; }

        /* --- DASHBOARD --- */
        #main-ui { display: none; flex-direction: row; height: 100vh; width: 100vw; position: absolute; top:0; left:0; }
        aside { width: 90px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 25px; background: rgba(0,0,0,0.4); }
        .nav-icon { width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #444; cursor: pointer; transition: 0.3s; }
        .nav-icon.active { background: var(--purple); color: white; box-shadow: 0 0 15px var(--purple); }
        
        main { flex-grow: 1; padding: 40px; overflow: auto; background: radial-gradient(circle at top right, #151321, #0b0a14); }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }
        
        .action-btn { background: transparent; border: 2px solid var(--purple); color: #b392f0; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; width: 100%; }
        .action-btn:hover { background: var(--purple); color: white; box-shadow: 0 0 15px var(--purple); }
        
        .finance-card { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4444; padding: 20px; border-radius: 15px; margin-top: 20px; display: none; }

        #game-container { position: relative; margin: 0 auto; width: 800px; display: none; }
        #gameCanvas { background: #050505; border: 3px solid var(--green); border-radius: 15px; cursor: crosshair; }
        #game-hud { position: absolute; top: 20px; left: 20px; color: var(--green); font-family: monospace; font-size: 22px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="gateway">
        <div class="gate-card">
            <img src="logo.png" class="entry-logo" onerror="this.src='https://i.ibb.co/LzNfX8S/netlink-logo.png'">
            <h2>Netlink Enterprise</h2>
            <input type="password" id="gate-input" style="background:rgba(0,0,0,0.5); border:2px solid var(--border); color:white; padding:20px; border-radius:15px; width:300px; text-align:center; font-size:20px; margin-bottom:20px;" placeholder="SYSTEM CODE">
            <br>
            <button class="action-btn" style="width:200px" onclick="checkGate()">Access</button>
        </div>
    </div>

    <div id="hub-ui">
        <h2 style="margin-bottom: 40px; letter-spacing: 5px;">SELECT PERSONNEL</h2>
        <div class="node-grid">
            <button class="action-btn" onclick="launch('Manav', 'Founder')">Manav <br><small>Founder</small></button>
            <button class="action-btn" onclick="launch('Keshav', 'Co-Founder')">Keshav <br><small>Co-Founder</small></button>
            <button class="action-btn" onclick="launch('Colton', 'Director')">Colton <br><small>Director</small></button>
            <button class="action-btn" onclick="launch('Agastya', 'Employee')">Agastya <br><small>Employee</small></button>
        </div>
    </div>

    <div id="main-ui">
        <aside>
            <div class="nav-icon active" onclick="showView('home', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-icon" onclick="showView('game-view', this)"><i class="fa-solid fa-crosshairs"></i></div>
            <div class="nav-icon" onclick="location.reload()" style="margin-top:auto; margin-bottom:30px"><i class="fa-solid fa-power-off"></i></div>
        </aside>
        
        <main>
            <div id="home" class="view-section active">
                <h1 id="welcome-msg" style="font-size:48px;">Welcome</h1>
                <p id="role-tag" style="color:var(--purple); letter-spacing:2px; margin-bottom:30px;"></p>
                
                <div id="finance-tool" class="finance-card">
                    <h3 style="color:#ff4444"><i class="fa-solid fa-vault"></i> FINANCIAL MANAGEMENT</h3>
                    <p style="margin-top: 10px;">Access Level: FOUNDER ONLY. System funds currently encrypted.</p>
                </div>
            </div>

            <div id="game-view" class="view-section">
                <h1 style="color:var(--green); margin-bottom:20px">Prototype 1: WASD + Mouse</h1>
                <div id="game-container">
                    <div id="game-hud">SCORE: 0</div>
                    <canvas id="gameCanvas" width="800" height="500"></canvas>
                </div>
                <button id="run-btn" class="action-btn" style="width:200px; border-color:var(--green); color:var(--green); margin-top: 20px;" onclick="runEngine()">Initialize Engine</button>
            </div>
        </main>
    </div>

    <script>
        function checkGate() {
            if(document.getElementById('gate-input').value === "netlink2026") {
                document.getElementById('gateway').style.display = 'none';
                document.getElementById('hub-ui').style.display = 'flex';
            } else { alert("INVALID SYSTEM CODE"); }
        }

        function launch(name, role) {
            document.getElementById('hub-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('welcome-msg').innerText = `Welcome, ${name}`;
            document.getElementById('role-tag').innerText = `ACCESS LEVEL: ${role.toUpperCase()}`;
            
            // Restricted access check
            if(role === 'Founder') {
                document.getElementById('finance-tool').style.display = 'block';
            } else {
                document.getElementById('finance-tool').style.display = 'none';
            }
        }

        function showView(id, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // --- ZOMBIE COMBAT ENGINE ---
        let gameRunning = false;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let player = { x: 400, y: 250, size: 30, speed: 5, angle: 0 };
        let bullets = [], enemies = [], keys = {}, mouse = { x: 0, y: 0 }, score = 0;

        function runEngine() {
            document.getElementById('run-btn').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            gameRunning = true;
            
            window.onkeydown = e => keys[e.code] = true;
            window.onkeyup = e => keys[e.code] = false;

            canvas.onmousemove = e => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            };

            canvas.onmousedown = () => {
                const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*8, vy: Math.sin(angle)*8 });
            };

            setInterval(() => {
                if(gameRunning) enemies.push({ x: Math.random()*800, y: Math.random()*500, speed: 1.5 });
            }, 1500);

            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if(!gameRunning) return;
            ctx.clearRect(0, 0, 800, 500);

            // Movement
            if(keys.KeyW && player.y > 0) player.y -= player.speed;
            if(keys.KeyS && player.y < 500) player.y += player.speed;
            if(keys.KeyA && player.x > 0) player.x -= player.speed;
            if(keys.KeyD && player.x < 800) player.x += player.speed;
            player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

            // Draw Player
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#b52f2f'; ctx.fillRect(-15, -15, 30, 30);
            ctx.fillStyle = '#e2ab86'; ctx.fillRect(-10, -10, 20, 20);
            ctx.fillStyle = 'black'; ctx.fillRect(2, -8, 10, 4);
            ctx.restore();

            // Bullets
            bullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 4, 4);
                if(b.x < 0 || b.x > 800 || b.y < 0 || b.y > 500) bullets.splice(bi, 1);
            });

            // Enemies
            enemies.forEach((e, ei) => {
                let dx = player.x - e.x, dy = player.y - e.y, dist = Math.sqrt(dx*dx + dy*dy);
                e.x += (dx/dist) * e.speed; e.y += (dy/dist) * e.speed;
                
                ctx.fillStyle = '#4a7c50'; ctx.fillRect(e.x-15, e.y-15, 30, 30);
                
                bullets.forEach((b, bi) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < 20) {
                        enemies.splice(ei, 1); bullets.splice(bi, 1);
                        score += 100; document.getElementById('game-hud').innerText = "SCORE: " + score;
                    }
                });

                if(dist < 20) {
                    gameRunning = false;
                    alert("NODE COMPROMISED. FINAL SCORE: " + score);
                    location.reload();
                }
            });

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
