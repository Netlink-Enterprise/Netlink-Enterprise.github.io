<!DOCTYPE html>
<html>
<head>
    <title>Netlink-Enterprise</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #111, #000);
            color: white;
            text-align: center;
        }

        .page {
            display: none;
            height: 100vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #222;
            color: white;
        }

        button:hover {
            background: #444;
        }

        .panel {
            width: 80%;
            max-width: 600px;
            background: #111;
            padding: 20px;
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="page" style="display:flex;">
    <h1>Netlink-Enterprise Login</h1>
    <input type="password" id="code" placeholder="Enter Code">
    <button onclick="login()">Enter</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
    <h1>Netlink-Enterprise</h1>
    <button onclick="openEmployee()">Employee</button>
    <button onclick="openFounder()">Founder</button>
    <button onclick="openCofounder()">Co-Founder</button>
    <button onclick="openDirector()">Director</button>
</div>

<!-- EMPLOYEE -->
<div id="employee" class="page">
    <div class="panel">
        <h2>Assignments</h2>
        <div id="assignments">No assignments yet.</div>
        <button onclick="back()">Back</button>
    </div>
</div>

<!-- FOUNDER -->
<div id="founder" class="page">
    <div class="panel">
        <h2>Founder Panel</h2>
        <textarea id="announcementInput" placeholder="Write announcement..."></textarea>
        <button onclick="postAnnouncement()">Send Announcement</button>

        <h3>Announcements</h3>
        <div id="announcements"></div>

        <h3>Assignments</h3>
        <textarea id="assignmentInput" placeholder="Write assignment..."></textarea>
        <button onclick="postAssignment()">Post Assignment</button>

        <button onclick="back()">Back</button>
    </div>
</div>

<!-- COFOUNDER -->
<div id="cofounder" class="page">
    <div class="panel">
        <h2>Co-Founder View</h2>
        <div id="cofounderView"></div>
        <button onclick="back()">Back</button>
    </div>
</div>

<!-- DIRECTOR -->
<div id="director" class="page">
    <div class="panel">
        <h2>Director View (Announcements Only)</h2>
        <div id="directorAnnouncements"></div>
        <button onclick="back()">Back</button>
    </div>
</div>

<script>
let role = "";

function show(page){
    document.querySelectorAll('.page').forEach(p=>p.style.display='none');
    document.getElementById(page).style.display='flex';
}

function login(){
    const code = document.getElementById("code").value;

    if(code === "314314") role = "founder";
    else if(code === "444444") role = "cofounder";
    else if(code === "555555") role = "director";
    else role = "none";

    if(role === "none"){
        alert("Wrong code");
        show("login");
        return;
    }

    show("dashboard");
}

function openEmployee(){
    show("employee");
}

function openFounder(){
    if(role !== "founder") return alert("Founder only");
    show("founder");
}

function openCofounder(){
    if(role !== "cofounder") return alert("Co-Founder only");
    loadCofounder();
    show("cofounder");
}

function openDirector(){
    if(role !== "director") return alert("Director only");
    document.getElementById("directorAnnouncements").innerHTML = document.getElementById("announcements").innerHTML;
    show("director");
}

function back(){
    show("dashboard");
}

function postAnnouncement(){
    const text = document.getElementById("announcementInput").value;
    if(!text) return;
    document.getElementById("announcements").innerHTML += "<p>"+text+"</p>";
    document.getElementById("announcementInput").value="";
}

function postAssignment(){
    const text = document.getElementById("assignmentInput").value;
    if(!text) return;
    document.getElementById("assignments").innerHTML = "<p>"+text+"</p>";
    document.getElementById("assignmentInput").value="";
}

function loadCofounder(){
    document.getElementById("cofounderView").innerHTML = document.getElementById("announcements").innerHTML;
}
</script>

</body>
</html>
