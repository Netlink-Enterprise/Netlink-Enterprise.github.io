<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlink-Enterprise | Elite Command</title>
    <style>
        :root {
            --primary: #00ffcc; 
            --founder-glow: #00d9ff; 
            --cofounder-glow: #ff00ff; 
            --bg-dark: #050505;
            --card-bg: #111;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- LOGIN GATE --- */
        #login-screen {
            margin-top: 100px;
            text-align: center;
            background: #111;
            padding: 40px;
            border: 2px solid var(--primary);
        }

        input {
            background: #000;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px;
            margin: 10px 0;
            text-align: center;
        }

        /* --- DASHBOARD --- */
        #dashboard { display: none; width: 90%; max-width: 1200px; padding: 20px; }

        .profile-container { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 20px;
            width: 200px;
            text-align: center;
        }

        .active-session {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            border-top: 2px solid #222;
            padding-top: 20px;
        }

        .section-box {
            background: #0c0c0c;
            border: 1px solid #333;
            padding: 20px;
            min-height: 300px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn:hover { background: var(--primary); color: black; }

        /* --- GAME OVERLAY --- */
        #game-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas { background: #1a1a1a; border: 2px solid #ff4444; cursor: crosshair; }

        .msg-log {
            background: #000;
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid #222;
            color: #00ff00;
        }
    </style>
</head>
<body>

    <!-- 1. SYSTEM ENTRY -->
    <div id="login-screen">
        <h1>NETLINK-ENTERPRISE</h1>
        <input type="password" id="entry-code" placeholder="ENTER 201400">
        <button class="btn" onclick="checkEntry()">INITIALIZE</button>
    </div>

    <!-- 2. DASHBOARD -->
    <div id="dashboard">
        <div class="profile-container">
            <div class="card" style="border-color: var(--founder-glow)">
                <span style="font-size: 10px; color: var(--founder-glow)">FOUNDER</span>
                <button class="btn" onclick="loginProfile('Founder', '314314')">LOGIN</button>
                <div style="margin-top: 10px; font-weight: bold;">Manav Bisht</div>
            </div>
            <div class="card" style="border-color: var(--cofounder-glow)">
                <span style="font-size: 10px; color: var(--cofounder-glow)">CO-FOUNDER</span>
                <button class="btn" onclick="loginProfile('Co-Founder', '444444')">LOGIN</button>
                <div style="margin-top: 10px; font-weight: bold;">Keshav</div>
            </div>
            <div class="card">
                <span style="font-size: 10px; color: #888">DIRECTOR</span>
                <button class="btn" onclick="loginProfile('Director', '55555')">LOGIN</button>
                <div style="margin-top: 10px; font-weight: bold;">Colton</div>
            </div>
        </div>

        <!-- HIDDEN UNTIL PROFILE LOGIN -->
        <div id="session-ui" class="active-session">
            <!-- Left: Actions -->
            <div class="section-box">
                <h3 id="user-display">User Actions</h3>
                <div id="founder-tools" style="display:none;">
                    <button class="btn" onclick="sendMoney()">Send Money to Employee</button>
                    <p style="font-size: 12px; color: #888;">Current Ledger: <span id="balance-display">$0</span></p>
                </div>
                <div id="game-access" style="display:none;">
                    <button class="btn" style="border-color: #ff4444; color: #ff4444;" onclick="startGame()">PROTOTYPE 1 GAME</button>
                </div>
                <button class="btn" onclick="location.reload()">LOGOUT</button>
            </div>

            <!-- Right: Messages -->
            <div class="section-box">
                <h3>Secure Messaging</h3>
                <div class="msg-log" id="msg-log">
                    [SYSTEM] Secure channel active...
                </div>
                <input type="text" id="msg-input" placeholder="Type message..." style="width: 70%;">
                <button class="btn" style="width: 25%;" onclick="postMsg()">SEND</button>
            </div>
        </div>
    </div>

    <!-- 3. ZOMBIE GAME -->
    <div id="game-container">
        <h2 style="color: #ff4444;">ZOMBIE OUTBREAK: PROTOTYPE 1</h2>
        <p>Click to shoot zombies. Don't let them hit the base line!</p>
        <canvas id="zombieCanvas" width="600" height="400"></canvas>
        <button class="btn" style="width: 200px;" onclick="closeGame()">EXIT GAME</button>
    </div>

    <script>
        let currentRole = "";
        let balance = 0;

        function checkEntry() {
            if (document.getElementById('entry-code').value === "201400") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else { alert("WRONG CODE"); }
        }

        function loginProfile(role, pin) {
            let pass = prompt("Enter PIN for " + role);
            if (pass === pin) {
                currentRole = role;
                document.getElementById('session-ui').style.display = 'grid';
                document.getElementById('user-display').innerText = role + " Console";
                
                // Show/Hide tools
                document.getElementById('founder-tools').style.display = (role === 'Founder') ? 'block' : 'none';
                document.getElementById('game-access').style.display = (role === 'Founder' || role === 'Director') ? 'block' : 'none';
                
                alert("Login Successful: Welcome " + role);
            } else { alert("ACCESS DENIED"); }
        }

        function sendMoney() {
            let name = prompt("Enter Employee Name:");
            let amt = prompt("Enter Amount:");
            if (name && amt) {
                balance += parseInt(amt);
                document.getElementById('balance-display').innerText = "$" + balance;
                logMsg("Transferred $" + amt + " to " + name);
            }
        }

        function postMsg() {
            let input = document.getElementById('msg-input');
            if (input.value) {
                logMsg(currentRole + ": " + input.value);
                input.value = "";
            }
        }

        function logMsg(text) {
            let log = document.getElementById('msg-log');
            log.innerHTML += "<br>> " + text;
            log.scrollTop = log.scrollHeight;
        }

        // --- GAME LOGIC ---
        let canvas = document.getElementById('zombieCanvas');
        let ctx = canvas.getContext('2d');
        let zombies = [];
        let gameRunning = false;

        function startGame() {
            document.getElementById('game-container').style.display = 'flex';
            gameRunning = true;
            zombies = [];
            requestAnimationFrame(gameLoop);
        }

        function closeGame() {
            document.getElementById('game-container').style.display = 'none';
            gameRunning = false;
        }

        canvas.addEventListener('mousedown', (e) => {
            let rect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            let mouseY = e.clientY - rect.top;
            zombies = zombies.filter(z => {
                let dist = Math.hypot(z.x - mouseX, z.y - mouseY);
                return dist > 20; // If distance is more than 20, they stay alive
            });
        });

        function gameLoop() {
            if (!gameRunning) return;
            ctx.clearRect(0,0,600,400);
            
            // Base Line
            ctx.strokeStyle = "blue";
            ctx.lineWidth = 5;
            ctx.strokeRect(0, 380, 600, 20);

            if (Math.random() < 0.02) zombies.push({x: Math.random() * 580, y: 0});

            zombies.forEach(z => {
                z.y += 2;
                ctx.fillStyle = "green";
                ctx.fillRect(z.x, z.y, 20, 20);
                if (z.y > 360) {
                    alert("Base Overrun!");
                    gameRunning = false;
                    closeGame();
                }
            });

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
